spring.application.name=MUweb
# ==========================================
# Configuración de conexión a MySQL
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3306/maestranza_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
# ATENCIÓN: Reemplaza "tu_contraseña_aqui" por la contraseña real de tu base de datos
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# Configuración de JPA / Hibernate
# ==========================================
# 'update' automatiza la creación y modificación de tablas basándose en tu código Java
spring.jpa.hibernate.ddl-auto=update
# Muestra por consola las consultas SQL que Spring ejecuta por detrás (útil para depurar)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect